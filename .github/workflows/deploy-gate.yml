# Deploy Security Gate - Phase 4 보안 자동화
# 프로덕션 배포 전 필수 보안 체크리스트 게이트
# security-scan + dependency-audit + codeql 모두 통과해야 배포 가능

name: Deploy Security Gate

on:
  # deploy-production 워크플로우에서 호출됨
  workflow_call:
    outputs:
      passed:
        description: 'Whether all security checks passed'
        value: ${{ jobs.gate-result.outputs.passed }}
  # 수동 실행 (보안 검증만 하고 싶을 때)
  workflow_dispatch:

concurrency:
  group: deploy-gate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '20'
  NPM_VERSION: '11.9.0'

jobs:
  # =============================================================================
  # 1. Gitleaks - 시크릿 스캐닝
  # =============================================================================
  secret-scan:
    name: '🔐 Secret Scan'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # =============================================================================
  # 2. Semgrep SAST - 정적 분석
  # =============================================================================
  sast-scan:
    name: '🔍 SAST Analysis'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/typescript" \
            --config "p/nextjs" \
            --config "p/react" \
            --config "p/sql-injection" \
            --config "p/xss" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --error \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude "coverage" \
            --exclude ".worktrees" \
            --exclude "src/generated" \
            --exclude "*.test.ts" \
            --exclude "*.test.tsx" \
            --exclude "*.spec.ts" \
            --exclude "tests" \
            src/

  # =============================================================================
  # 3. npm audit - 의존성 취약점 검사
  # =============================================================================
  dependency-audit:
    name: '📦 Dependency Audit'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup npm
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production, high severity)
        run: npm audit --omit=dev --audit-level=high

  # =============================================================================
  # 4. Security Headers Check  (기존 코드에서 참조)
  # =============================================================================
  security-headers:
    name: '🛡️ Security Headers Config'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify security headers configuration
        run: |
          echo "Checking next.config.ts for security headers..."

          # CSP 헤더 확인
          if grep -q "Content-Security-Policy" next.config.ts; then
            echo "✅ Content-Security-Policy configured"
          else
            echo "::warning::Content-Security-Policy not found in next.config.ts"
          fi

          # HSTS 헤더 확인
          if grep -q "Strict-Transport-Security" next.config.ts; then
            echo "✅ Strict-Transport-Security configured"
          else
            echo "::warning::Strict-Transport-Security not found in next.config.ts"
          fi

          # X-Frame-Options 확인
          if grep -q "X-Frame-Options" next.config.ts; then
            echo "✅ X-Frame-Options configured"
          else
            echo "::warning::X-Frame-Options not found in next.config.ts"
          fi

          # X-Content-Type-Options 확인
          if grep -q "X-Content-Type-Options" next.config.ts; then
            echo "✅ X-Content-Type-Options configured"
          else
            echo "::warning::X-Content-Type-Options not found in next.config.ts"
          fi

          echo ""
          echo "Security headers check complete."

  # =============================================================================
  # Gate Result - 모든 체크 통과 여부 판정
  # =============================================================================
  gate-result:
    name: '🚦 Security Gate Result'
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, dependency-audit, security-headers]
    if: always()
    outputs:
      passed: ${{ steps.check.outputs.passed }}

    steps:
      - name: Evaluate security gate
        id: check
        run: |
          echo "## 🔒 Deploy Security Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 SAST Analysis | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Security Headers | ${{ needs.security-headers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=false

          if [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "::error::❌ Secret scan FAILED - potential secrets detected in code"
            FAILED=true
          fi

          if [[ "${{ needs.sast-scan.result }}" != "success" ]]; then
            echo "::error::❌ SAST analysis FAILED - security vulnerabilities detected"
            FAILED=true
          fi

          if [[ "${{ needs.dependency-audit.result }}" != "success" ]]; then
            echo "::error::❌ Dependency audit FAILED - vulnerable packages detected"
            FAILED=true
          fi

          # Security headers는 경고만 (블로킹하지 않음)
          if [[ "${{ needs.security-headers.result }}" != "success" ]]; then
            echo "::warning::⚠️ Security headers check failed (non-blocking)"
          fi

          if [ "$FAILED" = true ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Security Gate FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Production deployment is **blocked**. Fix the issues above before deploying." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "passed=true" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Security Gate PASSED" >> $GITHUB_STEP_SUMMARY
          echo "All security checks passed. Production deployment is allowed." >> $GITHUB_STEP_SUMMARY
